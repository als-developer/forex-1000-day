<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOREX 1000/DAY - $20 to $1,000</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e27, #1a1f3a);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .header { text-align: center; padding: 40px 20px; background: rgba(0,255,136,0.1); border-radius: 20px; margin-bottom: 20px; }
        h1 { font-size: 42px; color: #00ff88; }
        .card { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 16px; }
        input { background: rgba(0,0,0,0.5); color: white; }
        button { background: linear-gradient(135deg, #00ff88, #00ccff); color: #0a0e27; font-weight: bold; font-size: 18px; cursor: pointer; }
        .profit { color: #00ff88; font-size: 36px; font-weight: bold; }
        .result { display: none; margin-top: 20px; padding: 20px; background: rgba(0,255,136,0.1); border-radius: 10px; text-align: center; }
        .show { display: block; }
        .investment-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0; }
        .inv-btn { background: rgba(255,255,255,0.2); padding: 10px; text-align: center; cursor: pointer; border-radius: 8px; flex: 1; }
        .inv-btn:hover { background: #00ff88; color: #0a0e27; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 FOREX 1000/DAY</h1>
            <p>Turn <strong style="color:#00ff88">$20</strong> into <strong style="color:#00ff88">$1,000</strong> in ONE TRADE!</p>
        </div>
        
        <div class="card">
            <h3>💰 INVEST NOW</h3>
            
            <div class="investment-buttons">
                <div class="inv-btn" data-amount="20">$20 → $1,000</div>
                <div class="inv-btn" data-amount="50">$50 → $2,500</div>
                <div class="inv-btn" data-amount="100">$100 → $5,000</div>
                <div class="inv-btn" data-amount="500">$500 → $25,000</div>
                <div class="inv-btn" data-amount="1000">$1,000 → $50,000</div>
            </div>
            
            <input type="number" id="amount" placeholder="Amount (min $20)" value="20" min="20">
            <input type="tel" id="phone" placeholder="Phone number (e.g., 0712345678)">
            
            <button id="tradeBtn">🚀 INVEST & EARN $1,000!</button>
            
            <div id="result" class="result"></div>
        </div>
        
        <div class="card" id="statsCard">
            <h3>📊 YOUR STATS</h3>
            <div id="stats">Enter phone number to see stats</div>
        </div>
    </div>

    <script>
        let currentAmount = 20;
        
        document.querySelectorAll('.inv-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentAmount = parseInt(btn.dataset.amount);
                document.getElementById('amount').value = currentAmount;
            });
        });
        
        document.getElementById('tradeBtn').addEventListener('click', async () => {
            const phone = document.getElementById('phone').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            
            if (!phone || phone.length < 10) {
                alert('Enter valid phone number');
                return;
            }
            
            if (!amount || amount < 20) {
                alert('Minimum investment is $20');
                return;
            }
            
            const btn = document.getElementById('tradeBtn');
            btn.disabled = true;
            btn.innerHTML = '⏳ PROCESSING...';
            
            try {
                const res = await fetch('/api/trade/accept', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber: phone, amount: amount, provider: 'mpesa' })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('result').innerHTML = `
                        <div class="profit">+ $${data.trade.profit.toFixed(2)} PROFIT!</div>
                        <p>Your $${amount} → $${(amount + data.trade.profit).toFixed(2)}</p>
                        <p>💰 Money sent to ${phone} via M-PESA!</p>
                        <small>Trade ID: ${data.trade.tradeId}</small>
                    `;
                    document.getElementById('result').classList.add('show');
                    
                    // Update stats
                    if (data.user) {
                        document.getElementById('stats').innerHTML = `
                            <p>💰 Balance: <strong>$${data.user.balance}</strong></p>
                            <p>📈 Total Profit: <strong>$${data.user.totalProfit}</strong></p>
                            <p>🎯 Win Rate: <strong>${data.user.winRate}%</strong></p>
                            <p>📊 Total Trades: <strong>${data.user.totalTrades}</strong></p>
                        `;
                    }
                } else {
                    alert(data.message);
                }
            } catch (err) {
                alert('Network error. Please try again.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 INVEST & EARN $1,000!';
            }
        });
        
        // Load stats on phone input
        let timeout;
        document.getElementById('phone').addEventListener('input', async (e) => {
            clearTimeout(timeout);
            timeout = setTimeout(async () => {
                const phone = e.target.value.trim();
                if (phone && phone.length >= 10) {
                    try {
                        const res = await fetch(`/api/user/stats?phoneNumber=${phone}`);
                        const data = await res.json();
                        if (data.success && data.user) {
                            document.getElementById('stats').innerHTML = `
                                <p>💰 Balance: <strong>$${data.user.balance}</strong></p>
                                <p>📈 Total Profit: <strong>$${data.user.totalProfit}</strong></p>
                                <p>🎯 Win Rate: <strong>${data.user.winRate}%</strong></p>
                                <p>📊 Total Trades: <strong>${data.user.totalTrades}</strong></p>
                                <p>🎯 Daily Profit: <strong>$${data.user.currentDailyProfit}</strong></p>
                            `;
                        }
                    } catch(err) {}
                }
            }, 500);
        });
    </script>
</body>
</html>
