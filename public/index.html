<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOREX 1000/DAY - $20 to $1,000 in ONE TRADE!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(0,255,136,0.1), rgba(0,204,255,0.1));
            border-radius: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(0,255,136,0.3);
        }
        h1 { font-size: 48px; background: linear-gradient(135deg, #00ff88, #00ccff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { font-size: 20px; margin-top: 10px; }
        .highlight { color: #00ff88; font-weight: bold; font-size: 28px; }
        
        .profit-badge {
            background: linear-gradient(135deg, #00ff88, #00ccff);
            color: #0a0e27;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 30px;
        }
        .profit-badge h2 { font-size: 36px; }
        .profit-badge p { font-size: 18px; }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card h2 { margin-bottom: 20px; color: #00ff88; }
        
        .investment-options {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .investment-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        .investment-btn:hover { background: rgba(0,255,136,0.2); border-color: #00ff88; transform: scale(1.05); }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #ccc; }
        .input-group input {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: white;
            font-size: 18px;
        }
        .input-group input:focus { outline: none; border-color: #00ff88; }
        
        .payment-methods {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .payment-badge {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .payment-badge.active { background: linear-gradient(135deg, #00ff88, #00ccff); color: #0a0e27; }
        
        .btn-primary {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            border: none;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
            color: #0a0e27;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(0,255,136,0.3); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .result {
            margin-top: 20px;
            padding: 25px;
            background: linear-gradient(135deg, rgba(0,255,136,0.1), rgba(0,204,255,0.1));
            border-radius: 15px;
            display: none;
            border: 1px solid #00ff88;
            text-align: center;
        }
        .result.show { display: block; animation: fadeIn 0.5s; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .profit-amount { color: #00ff88; font-size: 48px; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .stat-card { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: bold; color: #00ff88; }
        
        @media (max-width: 600px) {
            h1 { font-size: 32px; }
            .profit-amount { font-size: 32px; }
            .investment-btn { padding: 10px 15px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 FOREX 1000/DAY</h1>
            <div class="subtitle">Turn <span class="highlight">$20</span> into <span class="highlight">$1,000</span> in <span class="highlight">ONE TRADE!</span></div>
        </div>
        
        <div class="profit-badge">
            <h2>💰 ONE TRADE = $1,000 PROFIT!</h2>
            <p>Invest $20 → Get $1,000 instantly!</p>
            <p>Invest $50 → Get $2,500!</p>
            <p>Invest $100 → Get $5,000!</p>
        </div>
        
        <div class="card">
            <h2>⚡ START TRADING NOW</h2>
            
            <div class="investment-options">
                <button class="investment-btn" data-amount="20">$20 → $1,000</button>
                <button class="investment-btn" data-amount="50">$50 → $2,500</button>
                <button class="investment-btn" data-amount="100">$100 → $5,000</button>
                <button class="investment-btn" data-amount="500">$500 → $25,000</button>
                <button class="investment-btn" data-amount="1000">$1,000 → $50,000</button>
            </div>
            
            <div class="input-group">
                <label>💰 Investment Amount (USD)</label>
                <input type="number" id="amount" placeholder="Enter amount (min $20)" min="20" step="10" value="20">
            </div>
            
            <div class="input-group">
                <label>📱 Phone Number (M-Pesa/Tigo/Airtel)</label>
                <input type="tel" id="phone" placeholder="e.g., 0712345678">
            </div>
            
            <div class="payment-methods">
                <div class="payment-badge active" data-provider="mpesa">M-PESA</div>
                <div class="payment-badge" data-provider="tigopesa">TIGO PESA</div>
                <div class="payment-badge" data-provider="airtel">AIRTEL MONEY</div>
            </div>
            
            <button class="btn-primary" id="tradeBtn">
                🚀 INVEST & EARN $1,000!
            </button>
            
            <div class="result" id="result">
                <div id="resultContent"></div>
            </div>
        </div>
        
        <div class="card" id="statsCard">
            <h2>📊 YOUR PERFORMANCE</h2>
            <div id="statsContent">
                <p style="text-align: center; color: #aaa;">Enter your phone number and make a trade</p>
            </div>
        </div>
    </div>

    <script>
        let currentProvider = 'mpesa';
        
        // Investment buttons
        document.querySelectorAll('.investment-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const amount = btn.dataset.amount;
                document.getElementById('amount').value = amount;
                const profit = amount === '20' ? '1,000' : amount === '50' ? '2,500' : amount === '100' ? '5,000' : amount === '500' ? '25,000' : '50,000';
                showToast(`💰 Invest $${amount} to earn $${profit} profit!`);
            });
        });
        
        // Payment methods
        document.querySelectorAll('.payment-badge').forEach(badge => {
            badge.addEventListener('click', () => {
                document.querySelectorAll('.payment-badge').forEach(b => b.classList.remove('active'));
                badge.classList.add('active');
                currentProvider = badge.dataset.provider;
            });
        });
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#00ff88; color:#0a0e27; padding:12px 20px; border-radius:8px; z-index:1000; animation:slideIn 0.3s ease; font-weight:bold;';
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        const tradeBtn = document.getElementById('tradeBtn');
        
        async function startTrade() {
            const phone = document.getElementById('phone').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            
            if (!phone || phone.length < 10) {
                showToast('Please enter a valid phone number');
                return;
            }
            
            if (!amount || amount < 20) {
                showToast('Minimum investment is $20 to earn $1,000!');
                return;
            }
            
            if (amount > 10000) {
                showToast('Maximum investment is $10,000');
                return;
            }
            
            tradeBtn.disabled = true;
            tradeBtn.innerHTML = '⏳ PROCESSING YOUR TRADE...';
            
            try {
                const response = await fetch('/api/trade/accept', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phoneNumber: phone,
                        amount: amount,
                        provider: currentProvider
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const profit = data.trade.profit;
                    const totalReturn = amount + profit;
                    
                    document.getElementById('resultContent').innerHTML = `
                        <div style="text-align: center;">
                            <div style="font-size: 24px; margin-bottom: 10px;">🎉🎉🎉 CONGRATULATIONS! 🎉🎉🎉</div>
                            <div class="profit-amount">+ $${profit.toFixed(2)} PROFIT!</div>
                            <div style="font-size: 20px; margin: 10px 0;">Your $${amount} → $${totalReturn.toFixed(2)}</div>
                            <div style="font-size: 16px; color: #00ff88; margin: 10px 0;">💰 Money sent to ${phone} via ${currentProvider.toUpperCase()}!</div>
                            <div style="font-size: 14px; color: #aaa; margin-top: 15px;">Trade ID: ${data.trade.tradeId}</div>
                            <div style="font-size: 14px; color: #aaa;">Confidence: ${data.trade.confidence}%</div>
                        </div>
                    `;
                    document.getElementById('result').classList.add('show');
                    
                    // Update stats
                    if (data.user) {
                        document.getElementById('statsContent').innerHTML = `
                            <div class="stats-grid">
                                <div class="stat-card">
                                    <div>Current Balance</div>
                                    <div class="stat-value">$${data.user.balance}</div>
                                </div>
                                <div class="stat-card">
                                    <div>Total Profit</div>
                                    <div class="stat-value">$${data.user.totalProfit}</div>
                                </div>
                                <div class="stat-card">
                                    <div>Win Rate</div>
                                    <div class="stat-value">${data.user.winRate}%</div>
                                </div>
                                <div class="stat-card">
                                    <div>Total Trades</div>
                                    <div class="stat-value">${data.user.totalTrades}</div>
                                </div>
                            </div>
                            <div style="margin-top: 15px; text-align: center; padding: 15px; background: rgba(0,255,136,0.1); border-radius: 10px;">
                                <strong>${data.profitInfo.message}</strong>
                            </div>
                        `;
                    }
                    
                    showToast(`✅ SUCCESS! You earned $${profit.toFixed(2)} profit!`);
                    
                } else {
                    showToast(data.message || 'Trade failed. Please try again.');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Network error. Please check your connection.');
            } finally {
                tradeBtn.disabled = false;
                tradeBtn.innerHTML = '🚀 INVEST & EARN $1,000!';
            }
        }
        
        tradeBtn.addEventListener('click', startTrade);
        
        // Load stats when phone number changes
        let phoneTimeout;
        document.getElementById('phone').addEventListener('input', async (e) => {
            clearTimeout(phoneTimeout);
            phoneTimeout = setTimeout(async () => {
                const phone = e.target.value.trim();
                if (phone && phone.length >= 10) {
                    try {
                        const response = await fetch(`/api/user/stats?phoneNumber=${encodeURIComponent(phone)}`);
                        const data = await response.json();
                        if (data.success && data.user) {
                            document.getElementById('statsContent').innerHTML = `
                                <div class="stats-grid">
                                    <div class="stat-card">
                                        <div>Current Balance</div>
                                        <div class="stat-value">$${data.user.balance}</div>
                                    </div>
                                    <div class="stat-card">
                                        <div>Total Profit</div>
                                        <div class="stat-value">$${data.user.totalProfit}</div>
                                    </div>
                                    <div class="stat-card">
                                        <div>Win Rate</div>
                                        <div class="stat-value">${data.user.winRate}%</div>
                                    </div>
                                    <div class="stat-card">
                                        <div>Total Trades</div>
                                        <div class="stat-value">${data.user.totalTrades}</div>
                                    </div>
                                </div>
                            `;
                        }
                    } catch (error) {}
                }
            }, 500);
        });
    </script>
</body>
</html>
