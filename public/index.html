<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOREX 1000/DAY - $20 to $1,000</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e27, #1a1f3a);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .header { text-align: center; padding: 30px; background: rgba(0,255,136,0.1); border-radius: 20px; margin-bottom: 20px; }
        h1 { font-size: 36px; color: #00ff88; }
        .card { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 16px; }
        input { background: rgba(0,0,0,0.5); color: white; }
        button { background: linear-gradient(135deg, #00ff88, #00ccff); color: #0a0e27; font-weight: bold; font-size: 18px; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .investment-buttons { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        .inv-btn { background: rgba(255,255,255,0.2); padding: 12px; text-align: center; cursor: pointer; border-radius: 8px; flex: 1; }
        .inv-btn:hover { background: #00ff88; color: #0a0e27; }
        .result { display: none; margin-top: 20px; padding: 20px; background: rgba(0,255,136,0.1); border-radius: 10px; text-align: center; }
        .result.show { display: block; }
        .profit { color: #00ff88; font-size: 32px; font-weight: bold; }
        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .stat { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; text-align: center; }
        .stat-value { font-size: 20px; font-weight: bold; color: #00ff88; }
        .error { color: #ff4757; }
        @media (max-width: 600px) {
            h1 { font-size: 28px; }
            .inv-btn { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 FOREX 1000/DAY</h1>
            <p>Turn <strong style="color:#00ff88">$20</strong> into <strong style="color:#00ff88">$1,000</strong> in ONE TRADE!</p>
        </div>
        
        <div class="card">
            <h3>💰 EXECUTE TRADE</h3>
            
            <div class="investment-buttons">
                <div class="inv-btn" data-amount="20">$20 → $1,000</div>
                <div class="inv-btn" data-amount="50">$50 → $2,500</div>
                <div class="inv-btn" data-amount="100">$100 → $5,000</div>
                <div class="inv-btn" data-amount="500">$500 → $25,000</div>
                <div class="inv-btn" data-amount="1000">$1,000 → $50,000</div>
            </div>
            
            <input type="number" id="amount" placeholder="Investment Amount (min $20)" value="20" min="20">
            <input type="tel" id="phone" placeholder="Phone Number (e.g., 0712345678)" value="0796323348">
            <input type="email" id="email" placeholder="Email (Optional)" value="citytechuk@gmail.com">
            
            <button id="tradeBtn">🚀 INVEST & EARN $1,000!</button>
            
            <div id="result" class="result"></div>
        </div>
        
        <div class="card" id="statsCard">
            <h3>📊 YOUR PERFORMANCE</h3>
            <div id="statsContent">Enter phone number to see stats</div>
        </div>
        
        <div class="card">
            <h3>🧠 AI SELF-LEARNING STATUS</h3>
            <div id="aiStats">Loading...</div>
        </div>
    </div>

    <script>
        // Investment buttons
        document.querySelectorAll('.inv-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.getElementById('amount').value = btn.dataset.amount;
            });
        });
        
        // Execute trade
        document.getElementById('tradeBtn').addEventListener('click', async () => {
            const phone = document.getElementById('phone').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            const email = document.getElementById('email').value.trim();
            
            if (!phone || phone.length < 10) {
                alert('Please enter a valid phone number');
                return;
            }
            
            if (!amount || amount < 20) {
                alert('Minimum investment is $20');
                return;
            }
            
            const btn = document.getElementById('tradeBtn');
            btn.disabled = true;
            btn.innerHTML = '⏳ PROCESSING TRADE...';
            
            try {
                const response = await fetch('/api/trade/accept', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phoneNumber: phone,
                        amount: amount,
                        provider: 'mpesa',
                        email: email
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Show result
                    document.getElementById('result').innerHTML = `
                        <div class="profit">+ $${data.trade.profit.toFixed(2)} PROFIT!</div>
                        <p>Your $${amount} → $${(amount + data.trade.profit).toFixed(2)}</p>
                        <p>💰 Money sent to ${phone} via M-PESA!</p>
                        <small>Trade ID: ${data.trade.tradeId}</small>
                        <small>Confidence: ${data.trade.confidence}%</small>
                    `;
                    document.getElementById('result').classList.add('show');
                    
                    // Update stats
                    if (data.user) {
                        document.getElementById('statsContent').innerHTML = `
                            <div class="stat-grid">
                                <div class="stat"><div>💰 Balance</div><div class="stat-value">$${data.user.balance}</div></div>
                                <div class="stat"><div>📈 Total Profit</div><div class="stat-value">$${data.user.totalProfit}</div></div>
                                <div class="stat"><div>🎯 Win Rate</div><div class="stat-value">${data.user.winRate}%</div></div>
                                <div class="stat"><div>📊 Total Trades</div><div class="stat-value">${data.user.totalTrades}</div></div>
                            </div>
                            <div style="margin-top: 10px;">🎯 Daily: $${data.user.currentDailyProfit} / $1,000</div>
                        `;
                    }
                    
                    alert(`✅ SUCCESS! You earned $${data.trade.profit.toFixed(2)} profit!`);
                    
                } else {
                    alert(data.message || 'Trade failed. Please try again.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Network error. Please check your connection and try again.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 INVEST & EARN $1,000!';
            }
        });
        
        // Load user stats
        async function loadUserStats(phone) {
            if (!phone || phone.length < 10) return;
            
            try {
                const response = await fetch(`/api/user/stats?phoneNumber=${encodeURIComponent(phone)}`);
                const data = await response.json();
                
                if (data.success && data.user) {
                    document.getElementById('statsContent').innerHTML = `
                        <div class="stat-grid">
                            <div class="stat"><div>💰 Balance</div><div class="stat-value">$${data.user.balance}</div></div>
                            <div class="stat"><div>📈 Total Profit</div><div class="stat-value">$${data.user.totalProfit}</div></div>
                            <div class="stat"><div>🎯 Win Rate</div><div class="stat-value">${data.user.winRate}%</div></div>
                            <div class="stat"><div>📊 Total Trades</div><div class="stat-value">${data.user.totalTrades}</div></div>
                        </div>
                        <div style="margin-top: 10px;">🎯 Daily: $${data.user.currentDailyProfit} / $1,000</div>
                    `;
                }
            } catch(e) {
                console.log('Stats error:', e);
            }
        }
        
        // Load AI status
        async function loadAIStatus() {
            try {
                const response = await fetch('/api/ai/learning');
                const data = await response.json();
                if (data.success) {
                    document.getElementById('aiStats').innerHTML = `
                        <div class="stat-grid">
                            <div class="stat"><div>Total Trades</div><div class="stat-value">${data.ai.totalTradesAnalyzed}</div></div>
                            <div class="stat"><div>Win Rate</div><div class="stat-value">${data.ai.currentWinRate}%</div></div>
                            <div class="stat"><div>Active Strategies</div><div class="stat-value">${data.ai.activeStrategies}</div></div>
                            <div class="stat"><div>AI Confidence</div><div class="stat-value">${data.ai.aiConfidenceLevel}</div></div>
                        </div>
                    `;
                }
            } catch(e) {
                document.getElementById('aiStats').innerHTML = 'Loading AI data...';
            }
        }
        
        // Load stats when phone number changes
        let phoneTimeout;
        document.getElementById('phone').addEventListener('input', (e) => {
            clearTimeout(phoneTimeout);
            phoneTimeout = setTimeout(() => {
                loadUserStats(e.target.value.trim());
            }, 500);
        });
        
        // Initial load
        const initialPhone = document.getElementById('phone').value.trim();
        if (initialPhone) loadUserStats(initialPhone);
        loadAIStatus();
        
        // Refresh every 10 seconds
        setInterval(() => {
            const phone = document.getElementById('phone').value.trim();
            if (phone) loadUserStats(phone);
            loadAIStatus();
        }, 10000);
    </script>
</body>
</html>
